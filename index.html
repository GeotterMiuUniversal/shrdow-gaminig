<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHRDOW GAMINIG | Top Up y Servicios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff002b; /* Rojo Gaming */
            --primary-hover: #ff3355;
            --dark-bg: #0a0a0a; 
            --card-bg: rgba(15, 15, 15, 0.85); 
            --sidebar-bg: rgba(15, 15, 15, 0.95);
            --text-color: #ffffff; 
            --text-muted: #cccccc; 
            --border-color: rgba(255, 0, 43, 0.3);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* --- FONDOS DINÁMICOS POR APARTADO --- */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
            opacity: 0;
            transform: scale(1.05);
        }

        .bg-overlay.active {
            opacity: 1;
            transform: scale(1);
        }

        .dark-tint {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.15) 0%, rgba(10, 10, 10, 0.3) 100%);
        }

        /* --- HEADER --- */
        header {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
        }
        
        .logo span {
            color: var(--primary);
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            display: block;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--border-color);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open { left: 0; }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 15px 30px;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(255, 0, 43, 0.1);
            color: var(--text-color);
            border-left: 4px solid var(--primary);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: none;
        }
        .overlay.active { display: block; }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            padding: 140px 0px 50px; 
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .catalog-container {
            padding: 20px 5%;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .section-content {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .section-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- BIENVENIDA --- */
        .welcome-full-width {
            width: 100%;
            text-align: center;
            position: relative;
            padding: 60px 20px;
        }

        .welcome-text {
            font-size: 1.4rem;
            color: var(--text-color);
            max-width: 700px;
            margin: 0 auto 35px;
            line-height: 1.6;
            font-weight: 600;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
        }

        /* --- GRID DE PRODUCTOS --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px); 
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 12px 30px rgba(255, 0, 43, 0.4);
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: #222;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }

        .card h3 {
            color: var(--text-color);
            font-size: 1.15rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .btn-buy {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.2s;
            text-align: center;
            border: none;
            cursor: pointer;
        }

        .btn-buy:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 15px var(--primary);
        }

        .btn-large {
            display: inline-block; 
            width: auto; 
            min-width: 280px;
            padding: 16px 40px; 
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 30px;
            background: rgba(5, 5, 5, 0.95);
            color: #888;
            margin-top: 60px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .main-content { padding-top: 110px; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
            .welcome-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div id="bg-home" class="bg-overlay active" style="background-image: url('https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg');"></div>
    <div id="bg-ff" class="bg-overlay" style="background-image: url('https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg');"></div>
    <div id="bg-bs" class="bg-overlay" style="background-image: url('https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg');"></div>
    <div id="bg-ml" class="bg-overlay" style="background-image: url('https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg');"></div>
    <div id="bg-roblox" class="bg-overlay" style="background-image: url('https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg');"></div>
    <div id="bg-streaming" class="bg-overlay" style="background-image: url('https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg');"></div>

    <div class="dark-tint"></div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <header>
        <a href="#" class="logo">SHRDOW <span>GAMINIG</span></a>
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    </header>

    <nav class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
        <button class="nav-btn active" data-target="home" onclick="showSection('home', this, 'bg-home')"><i class="fas fa-home"></i> Inicio</button>
        <button class="nav-btn" data-target="ff" onclick="showSection('ff', this, 'bg-ff')"><i class="fas fa-fire"></i> Free Fire</button>
        <button class="nav-btn" data-target="bs" onclick="showSection('bs', this, 'bg-bs')"><i class="fas fa-skull"></i> Blood Strike</button>
        <button class="nav-btn" data-target="ml" onclick="showSection('ml', this, 'bg-ml')"><i class="fas fa-shield-alt"></i> Mobile Legends</button>
        <button class="nav-btn" data-target="roblox" onclick="showSection('roblox', this, 'bg-roblox')"><i class="fas fa-cube"></i> Roblox</button>
        <button class="nav-btn" data-target="streaming" onclick="showSection('streaming', this, 'bg-streaming')"><i class="fas fa-tv"></i> Streaming</button>
    </nav>

    <main class="main-content">
        
        <div id="home" class="section-content active">
            <div class="welcome-full-width">
                <p class="welcome-text">
                    Recargas inmediatas y 100% seguras. Elige tu apartado favorito en el menú lateral para consultar la disponibilidad de diamantes, robux y pases.
                </p>
                <button type="button" onclick="toggleMenu()" class="btn-buy btn-large" style="margin: 0 auto; display: block;">
                    <i class="fas fa-bars"></i> Ver Catálogo de Productos
                </button>
            </div>
        </div>

        <div id="ff" class="section-content"><div class="catalog-container"><h2 class="section-title">Free Fire</h2><div id="ff-products" class="products-grid"></div></div></div>
        <div id="bs" class="section-content"><div class="catalog-container"><h2 class="section-title">Blood Strike</h2><div id="bs-products" class="products-grid"></div></div></div>
        <div id="ml" class="section-content"><div class="catalog-container"><h2 class="section-title">Mobile Legends</h2><div id="ml-products" class="products-grid"></div></div></div>
        <div id="roblox" class="section-content"><div class="catalog-container"><h2 class="section-title">Roblox</h2><div id="roblox-products" class="products-grid"></div></div></div>
        <div id="streaming" class="section-content"><div class="catalog-container"><h2 class="section-title">Pantallas de Streaming</h2><div id="streaming-products" class="products-grid"></div></div></div>

    </main>

    <footer>
        <p>© 2026 SHRDOW GAMINIG. Todos los derechos reservados.</p>
    </footer>

    <script>
        const whatsappNumber = "584262305112";

        // PRODUCTOS DE FREE FIRE
        const ffData = [
            { amount: '110 Diamantes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/110%20diamantes.jpg" },
            { amount: '220 Diamantes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/220%20diamantes%20.png" },
            { amount: '341 Diamantes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/341%20diamantes.jpg" },
            { amount: '451 Diamantes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/451%20diamantes.jpg" },
            { amount: '572 Diamantes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/572%20diamantes.jpg" },
            { amount: '1155 Diamantes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/1155%20diamantes.jpg" },
            { amount: '2376 Diamantes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/2376%20diamantes.jpg" },
            { amount: 'Pase de Élite', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pase%20elite%20free%20fire.jpg" }
        ];

        // PRODUCTOS DE BLOOD STRIKE
        const bsData = [
            { amount: '100 Blood Points', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/100%20oro.jpg" },
            { amount: '320 Blood Points', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/320%20oro.jpg" },
            { amount: '1050 Blood Points', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/1050%20oro.jpg" },
            { amount: 'Pase de Batalla', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" }
        ];

        // PRODUCTOS DE MOBILE LEGENDS
        const mlData = [
            { amount: 'Diamonds Semanales', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" },
            { amount: 'Diamonds Mensuales', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" },
            { amount: 'Twilight Pass', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" }
        ];

        // PRODUCTOS DE ROBLOX
        const robloxData = [
            { amount: '282 Robux', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/282%20robux.jpg" },
            { amount: '475 Robux', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/475%20robux.jpg" },
            { amount: '539 Robux', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/539%20robux.jpg" },
            { amount: '1.000 Robux', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/1000%20robux.jpg" }
        ];

        // PRODUCTOS DE STREAMING
        const streamingData = [
            { amount: 'Netflix 1 Mes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" },
            { amount: 'HBO Max 1 Mes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" },
            { amount: 'Crunchyroll Premium', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" },
            { amount: 'Vix Premium', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" },
            { amount: 'Spotify Premium', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" },
            { amount: 'Disney+ 1 Mes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" },
            { amount: 'Prime Video 1 Mes', img: "https://raw.githubusercontent.com/GeotterMiuUniversal/shrdow-gaminig/refs/heads/main/pantalla%20de%20inicio.jpg" }
        ];

        function loadProducts(data, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let html = '';
            data.forEach((item, index) => {
                const mensaje = `Hola SHRDOW GAMINIG, quiero consultar el precio de: ${item.amount} (ID: ${containerId}-${index}).`;
                const urlWhatsApp = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(mensaje)}`;

                html += `
                    <div class="card">
                        <img src="${item.img}" alt="${item.amount}" class="card-img" onerror="this.src='https://via.placeholder.com/300x160?text=SHRDOW+GAMINIG'">
                        <div class="card-body">
                            <h3>${item.amount}</h3>
                            <a href="${urlWhatsApp}" target="_blank" class="btn-buy">
                                <i class="fab fa-whatsapp"></i> Consultar Precio
                            </a>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if(sidebar && overlay) {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            }
        }

        function showSection(sectionId, btnElement, bgId) {
            document.querySelectorAll('.section-content').forEach(sec => sec.classList.remove('active'));
            const targetSection = document.getElementById(sectionId);
            if(targetSection) targetSection.classList.add('active');
            
            document.querySelectorAll('.bg-overlay').forEach(bg => bg.classList.remove('active'));
            if(bgId) {
                const targetBg = document.getElementById(bgId);
                if(targetBg) targetBg.classList.add('active');
            }

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            const sidebar = document.getElementById('sidebar');
            if(sidebar && sidebar.classList.contains('open')) {
                toggleMenu();
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts(ffData, 'ff-products');
            loadProducts(bsData, 'bs-products');
            loadProducts(mlData, 'ml-products');
            loadProducts(robloxData, 'roblox-products');
            loadProducts(streamingData, 'streaming-products');
        });
    </script>
</body>
</html>
