<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHRDOW GAMING | Top Up y Servicios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FFD700; /* Dorado */
            --dark: #0a0a0a;
            --dark-glass: rgba(10, 10, 10, 0.95);
            --accent: #ff0055; /* Rosa neón para botones */
            --text: #ffffff;
            --gray: #2a2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 100%);
            min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            background: var(--dark-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            display: none; /* Oculto en desktop */
        }

        /* --- SIDEBAR (Menú) --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--dark-glass);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s ease;
            z-index: 1001;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open { left: 0; }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text);
            padding: 15px 30px;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(255, 215, 0, 0.1);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Overlay para cerrar menú en móvil */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: none;
        }
        .overlay.active { display: block; }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            padding: 120px 5% 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 5px solid var(--primary);
            padding-left: 15px;
        }

        .section-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .section-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- GRID DE PRODUCTOS --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: #151515;
            border: 1px solid #333;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Imagen del producto */
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid #333;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }

        .card h3 {
            color: var(--text);
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .product-amount {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            display: block;
        }

        .btn-buy {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
            text-align: center;
            margin-top: auto;
        }

        .btn-buy:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 30px;
            background: #050505;
            color: #888;
            margin-top: 50px;
            border-top: 1px solid #222;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .main-content { padding-top: 100px; }
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Overlay para cerrar menú -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- Header -->
    <header>
        <a href="#" class="logo">SHRDOW GAMING</a>
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    </header>

    <!-- Sidebar Menú -->
    <nav class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
        <button class="nav-btn active" onclick="showSection('home', this)"><i class="fas fa-home"></i> Inicio</button>
        <button class="nav-btn" onclick="showSection('ff', this)"><i class="fas fa-gamepad"></i> Free Fire</button>
        <button class="nav-btn" onclick="showSection('bs', this)"><i class="fas fa-skull"></i> Blood Strike</button>
        <button class="nav-btn" onclick="showSection('subs', this)"><i class="fas fa-tv"></i> Suscripciones</button>
        <button class="nav-btn" onclick="showSection('other', this)"><i class="fas fa-gamepad"></i> Otros Juegos</button>
    </nav>

    <!-- Contenido Principal -->
    <main class="main-content">
        
        <!-- SECCIÓN INICIO -->
        <div id="home" class="section-content active">
            <h2 class="section-title">Bienvenido a SHRDOW GAMING</h2>
            <div style="text-align: center; padding: 40px 20px; background: #111; border-radius: 15px; border: 1px solid #333;">
                <h1 style="font-size: 2.5rem; color: var(--primary); margin-bottom: 20px;">TOP UP RÁPIDO Y SEGURO</h1>
                <p style="font-size: 1.2rem; color: #ccc; margin-bottom: 30px;">
                    Obtén diamantes, créditos y suscripciones al mejor precio. 
                    <br>Pagos inmediatos mediante WhatsApp.
                </p>
                <a href="#ff" onclick="showSection('ff', document.querySelectorAll('.nav-btn'))" class="btn-buy" style="display: inline-block; width: auto; padding: 15px 40px; font-size: 1.2rem;">Ver Catálogo</a>
            </div>
        </div>

        <!-- SECCIÓN FREE FIRE -->
        <div id="ff" class="section-content">
            <h2 class="section-title">Free Fire</h2>
            <div id="ff-products" class="products-grid">
                <!-- Se llenará con JS -->
            </div>
        </div>

        <!-- SECCIÓN BLOOD STRIKE -->
        <div id="bs" class="section-content">
            <h2 class="section-title">Blood Strike</h2>
            <div id="bs-products" class="products-grid">
                <!-- Se llenará con JS -->
            </div>
        </div>

        <!-- SECCIÓN SUSCRIPCIONES -->
        <div id="subs" class="section-content">
            <h2 class="section-title">Suscripciones</h2>
            <div id="subs-products" class="products-grid">
                <!-- Se llenará con JS -->
            </div>
        </div>

        <!-- SECCIÓN OTROS -->
        <div id="other" class="section-content">
            <h2 class="section-title">Otros Juegos</h2>
            <div id="other-products" class="products-grid">
                <!-- Se llenará con JS -->
            </div>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 SHRDOW GAMING. Todos los derechos reservados.</p>
    </footer>

    <!-- AQUÍ COMIENZA LA PARTE 2 (SCRIPTS) -->
        <script>
        // --- CONFIGURACIÓN ---
        const whatsappNumber = "584262305112"; // Tu número de WhatsApp (sin el +)

        // --- DATOS DE PRODUCTOS (Imágenes reales y cantidades) ---
        // NOTA: He usado imágenes genéricas de alta calidad. Si tienes imágenes propias, 
        // solo reemplaza las URL dentro de las comillas "".
        
        const ffData = [
            { amount: '110 Diamantes', img: 'https://upload.wikimedia.org/wikipedia/en/thumb/2/22/Free_Fire_Logo.png/220px-Free_Fire_Logo.png' },
            { amount: '220 Diamantes', img: 'https://upload.wikimedia.org/wikipedia/en/thumb/2/22/Free_Fire_Logo.png/220px-Free_Fire_Logo.png' },
            { amount: '341 Diamantes', img: 'https://upload.wikimedia.org/wikipedia/en/thumb/2/22/Free_Fire_Logo.png/220px-Free_Fire_Logo.png' },
            { amount: '451 Diamantes', img: 'https://upload.wikimedia.org/wikipedia/en/thumb/2/22/Free_Fire_Logo.png/220px-Free_Fire_Logo.png' },
            { amount: '572 Diamantes', img: 'https://upload.wikimedia.org/wikipedia/en/thumb/2/22/Free_Fire_Logo.png/220px-Free_Fire_Logo.png' },
            { amount: '1155 Diamantes', img: 'https://upload.wikimedia.org/wikipedia/en/thumb/2/22/Free_Fire_Logo.png/220px-Free_Fire_Logo.png' },
            { amount: '2376 Diamantes', img: 'https://upload.wikimedia.org/wikipedia/en/thumb/2/22/Free_Fire_Logo.png/220px-Free_Fire_Logo.png' },
            { amount: '6138 Diamantes', img: 'https://upload.wikimedia.org/wikipedia/en/thumb/2/22/Free_Fire_Logo.png/220px-Free_Fire_Logo.png' },
            { amount: 'Pase de Élite', img: 'https://i.pinimg.com/736x/21/92/76/21927622360843274221565461277869.jpg' },
            { amount: 'Pase Élite Plus', img: 'https://i.pinimg.com/736x/21/92/76/21927622360843274221565461277869.jpg' }
        ];

        const bsData = [
            { amount: '100 Blood Points', img: 'https://play-lh.googleusercontent.com/2sR8s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3=w240-h480-rw' }, // Reemplazar con URL real si es necesario
            { amount: '320 Blood Points', img: 'https://play-lh.googleusercontent.com/2sR8s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3=w240-h480-rw' },
            { amount: '1050 Blood Points', img: 'https://play-lh.googleusercontent.com/2sR8s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3=w240-h480-rw' },
            { amount: 'Pase de Batalla', img: 'https://play-lh.googleusercontent.com/2sR8s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3s3=w240-h480-rw' }
        ];

        const subsData = [
            { amount: 'Netflix 1 Mes', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Netflix_2015_logo.svg/2560px-Netflix_2015_logo.svg.png' },
            { amount: 'Spotify Premium', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Spotify_logo_without_text.svg/2560px-Spotify_logo_without_text.svg.png' },
            { amount: 'Disney+ 1 Mes', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Disney%2B_logo.svg/2560px-Disney%2B_logo.svg.png' },
            { amount: 'HBO Max', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/HBO_Max_logo.svg/2560px-HBO_Max_logo.svg.png' },
            { amount: 'Amazon Prime', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Amazon_logo.svg/2560px-Amazon_logo.svg.png' }
        ];

        const otherData = [
            { amount: 'PUBG Mobile UC (180)', img: 'https://upload.wikimedia.org/wikipedia/en/thumb/8/82/PUBG_Mobile_logo.png/220px-PUBG_Mobile_logo.png' },
            { amount: 'Call of Duty Points', img: 'https://upload.wikimedia.org/wikipedia/en/thumb/5/53/Call_of_Duty_Logo.svg/2560px-Call_of_Duty_Logo.svg.png' },
            { amount: 'Fortnite V-Bucks', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Fortnite_logo.svg/2560px-Fortnite_logo.svg.png' },
            { amount: 'Robux (80)', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Roblox_Logo_2022.jpg/2560px-Roblox_Logo_2022.jpg' }
        ];

        // --- FUNCIONES ---

        // 1. Generar tarjetas HTML dinámicamente
        function loadProducts(data, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let html = '';
            data.forEach((item, index) => {
                // Mensaje para WhatsApp
                const mensaje = `Hola SHRDOW GAMING, quiero consultar el precio de: ${item.amount} (Producto ID: ${containerId}-${index}).`;
                const urlWhatsApp = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(mensaje)}`;

                html += `
                    <div class="card">
                        <img src="${item.img}" alt="${item.amount}" class="card-img" onerror="this.src='https://via.placeholder.com/300x180?text=SHRDOW+GAMING'">
                        <div class="card-body">
                            <h3>${item.amount}</h3>
                            <a href="${urlWhatsApp}" target="_blank" class="btn-buy">
                                <i class="fab fa-whatsapp"></i> Consultar Precio
                            </a>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 2. Manejo del Menú Lateral
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        // 3. Navegación entre secciones
        function showSection(sectionId, btnElement) {
            // Ocultar todas las secciones
            document.querySelectorAll('.section-content').forEach(sec => sec.classList.remove('active'));
            // Mostrar la seleccionada
            document.getElementById(sectionId).classList.add('active');
            
            // Actualizar botones del menú
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            // Cerrar menú en móvil al hacer clic
            if(window.innerWidth <= 768) {
                toggleMenu();
            }
            
            // Scroll suave al inicio
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- INICIALIZACIÓN ---
        // Cargar productos al abrir la página
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts(ffData, 'ff-products');
            loadProducts(bsData, 'bs-products');
            loadProducts(subsData, 'subs-products');
            loadProducts(otherData, 'other-products');
        });
    </script>
</body>
</html>
